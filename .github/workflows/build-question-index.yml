name: Build Question Bank Index

on:
  push:
    branches:
      - main
    paths:
      - "questions/**/*.json"
      - "scripts/build-question-index.js"
      - ".github/workflows/build-question-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-question-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build question-banks.json
        run: node scripts/build-question-index.js

      - name: Commit updated question-banks.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update question-banks.json"
          file_pattern: question-banks.json
