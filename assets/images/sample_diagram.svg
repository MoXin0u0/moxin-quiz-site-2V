<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
  <title id="title">墨忻刷題網範例流程圖</title>
  <desc id="desc">開始節點進入判斷節點，再依結果前往練習或複習，最後完成。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f2c20" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.16" />
    </filter>
  </defs>
  <rect width="760" height="360" rx="24" fill="#fff8ef" />
  <text x="380" y="42" text-anchor="middle" font-family="Noto Sans TC, Arial, sans-serif" font-size="24" font-weight="700" fill="#2e1f17">墨忻刷題網範例流程圖</text>
  <g filter="url(#shadow)" font-family="Noto Sans TC, Arial, sans-serif" font-size="18" fill="#2e1f17">
    <rect x="55" y="135" width="120" height="70" rx="35" fill="#efe5d8" stroke="#3f2c20" stroke-width="2" />
    <text x="115" y="177" text-anchor="middle">開始</text>

    <path d="M 300 118 L 385 170 L 300 222 L 215 170 Z" fill="#f6eddf" stroke="#3f2c20" stroke-width="2" />
    <text x="300" y="164" text-anchor="middle">是否</text>
    <text x="300" y="189" text-anchor="middle">作答正確？</text>

    <rect x="470" y="83" width="150" height="70" rx="16" fill="#eaf7ef" stroke="#22734f" stroke-width="2" />
    <text x="545" y="125" text-anchor="middle">下一題</text>

    <rect x="470" y="210" width="150" height="70" rx="16" fill="#fff0ed" stroke="#a93524" stroke-width="2" />
    <text x="545" y="238" text-anchor="middle">加入錯題本</text>
    <text x="545" y="263" text-anchor="middle">回到 queue</text>

    <rect x="650" y="135" width="80" height="70" rx="35" fill="#efe5d8" stroke="#3f2c20" stroke-width="2" />
    <text x="690" y="177" text-anchor="middle">完成</text>
  </g>

  <g stroke="#3f2c20" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M 175 170 L 212 170" />
    <path d="M 385 170 C 420 170 430 118 466 118" />
    <path d="M 385 170 C 420 170 430 245 466 245" />
    <path d="M 620 118 C 640 118 640 170 646 170" />
  </g>
  <text x="430" y="105" font-family="Noto Sans TC, Arial, sans-serif" font-size="15" fill="#22734f">答對</text>
  <text x="430" y="268" font-family="Noto Sans TC, Arial, sans-serif" font-size="15" fill="#a93524">答錯</text>
</svg>
